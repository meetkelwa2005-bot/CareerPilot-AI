services:
  # CareerPilot AI Unified Web Service (Spring Boot + Static Frontend UI)
  - type: web
    name: careerpilot-ai
    plan: free
    runtime: docker
    dockerfilePath: Dockerfile
    dockerContext: backend
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Set this in Render's dashboard if you have a key
