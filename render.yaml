services:
  # Database Service
  - type: db
    name: careerpilot-db
    plan: free
    ipAllowList: [] # allow all connections (Render defaults to internal access only unless specified)

  # Spring Boot Backend Service
  - type: web
    name: careerpilot-backend
    plan: free
    runtime: docker
    dockerfilePath: Dockerfile.backend
    dockerContext: backend
    envVars:
      - key: DB_URL
        fromDatabase:
          name: careerpilot-db
          property: connectionString
      - key: DB_USER
        fromDatabase:
          name: careerpilot-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: careerpilot-db
          property: password
      - key: DB_DRIVER
        value: org.postgresql.Driver
      - key: DB_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: GEMINI_API_KEY
        sync: false # User must set this manually in the Render dashboard

  # React Frontend Service
  - type: web
    name: careerpilot-frontend
    plan: free
    runtime: docker
    dockerfilePath: Dockerfile.frontend
    dockerContext: frontend
    ports:
      - key: PORT
        value: 5173
