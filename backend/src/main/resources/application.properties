spring.application.name=careerpilot-ai
server.port=8080

# DataSource configuration: Default to local persistent H2 in PostgreSQL compatibility mode.
# Can be overridden using environment variables DB_URL, DB_USER, DB_PASSWORD, DB_DRIVER, DB_DIALECT.
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/careerpilotdb;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA / Hibernate configuration
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Allow H2 Console access locally for debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Multipart uploads configuration (for Resume PDF)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Gemini API configuration
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

# Logging configuration
logging.level.org.springframework.web=INFO
logging.level.com.careerpilot.ai=DEBUG
